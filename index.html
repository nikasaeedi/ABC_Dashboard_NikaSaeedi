<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Command Center — ABC Logistics</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f172a;
      --surface:   #1e293b;
      --border:    #334155;
      --muted:     #94a3b8;
      --text:      #f1f5f9;
      --primary:   #3b82f6;
      --primary-h: #2563eb;
      --danger:    #ef4444;
      --danger-h:  #dc2626;
      --radius:    0.5rem;
      --font:      'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* Navigation */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      height: 4rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 0.625rem;
      font-weight: 700;
      font-size: 1.125rem;
      color: var(--text);
      text-decoration: none;
    }

    .nav-brand svg { flex-shrink: 0; }

    .nav-links { display: flex; gap: 0.25rem; }

    .nav-links a {
      padding: 0.5rem 1rem;
      border-radius: var(--radius);
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--muted);
      text-decoration: none;
      transition: background 0.15s, color 0.15s;
    }

    .nav-links a:hover { background: var(--border); color: var(--text); }
    .nav-links a.active { background: var(--primary); color: #fff; }

    /* Layout */
    main {
      max-width: 72rem;
      margin: 0 auto;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    .page-header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.025em;
    }

    .page-header p {
      color: var(--muted);
      margin-top: 0.25rem;
      font-size: 0.9rem;
    }

    /* Cards */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
    }

    .card-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 1rem;
    }

    /* Form */
    .form-row {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      align-items: flex-end;
    }

    .form-group { display: flex; flex-direction: column; gap: 0.375rem; flex: 1 1 200px; }

    .form-group label {
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    input {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.6rem 0.85rem;
      color: var(--text);
      font-size: 0.9rem;
      outline: none;
      transition: border 0.15s;
    }

    input:focus { border-color: var(--primary); }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.875rem;
      font-weight: 600;
      padding: 0.6rem 1.25rem;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-h); }

    .btn-ghost {
      background: transparent;
      color: var(--danger);
      border: 1px solid var(--danger);
    }
    .btn-ghost:hover { background: var(--danger); color: #fff; }

    /* Alert */
    .alert {
      padding: 0.65rem 1rem;
      border-radius: var(--radius);
      font-size: 0.85rem;
      font-weight: 500;
      display: none;
      margin-top: 0.75rem;
    }

    .alert-error { background: #7f1d1d40; border: 1px solid #b91c1c; color: #fca5a5; }
    .alert-success { background: #14532d40; border: 1px solid #15803d; color: #86efac; }

    /* Table */
    .table-wrap { overflow-x: auto; margin-top: 0.5rem; }

    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }

    th {
      text-align: left;
      padding: 0.6rem 1rem;
      font-weight: 600;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }

    td {
      padding: 0.7rem 1rem;
      border-bottom: 1px solid var(--border);
    }

    tr:last-child td { border-bottom: none; }

    .badge {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.15rem 0.55rem;
      border-radius: 9999px;
    }

    .badge-ok { background: #14532d; color: #86efac; }
    .badge-low { background: #7f1d1d; color: #fca5a5; }

    .delete-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 0.25rem;
      border-radius: var(--radius);
      transition: color 0.15s, background 0.15s;
    }

    .delete-btn:hover { color: var(--danger); background: #7f1d1d40; }

    .empty-state {
      text-align: center;
      padding: 2.5rem 1rem;
      color: var(--muted);
      font-size: 0.9rem;
    }

    /* Grid */
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
    }

    /* Chart */
    .chart-container {
      position: relative;
      width: 100%;
      min-height: 300px;
    }

    /* Responsive */
    @media (max-width: 768px) {
      main { padding: 1rem; }
      .grid-2 { grid-template-columns: 1fr; }
      .form-row { flex-direction: column; }
      .form-group { flex: 1 1 100%; }
      nav { padding: 0 1rem; }
    }
  </style>
</head>
<body>

  <!-- Navigation -->
  <nav>
    <a href="index.html" class="nav-brand">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
        <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
        <line x1="12" y1="22.08" x2="12" y2="12"/>
      </svg>
      Command Center
    </a>
    <div class="nav-links">
      <a href="index.html" class="active">Dashboard</a>
      <a href="about.html">About</a>
    </div>
  </nav>

  <!-- Main Content -->
  <main>
    <div class="page-header">
      <h1>Inventory Dashboard</h1>
      <p>ABC Logistics &mdash; Real-time stock overview for floor operations.</p>
    </div>

    <!-- Add Item Card -->
    <div class="card">
      <div class="card-title">Add Inventory Item</div>
      <form id="itemForm" autocomplete="off">
        <div class="form-row">
          <div class="form-group">
            <label for="itemName">Item Name</label>
            <input type="text" id="itemName" placeholder="e.g. Bubble Wrap" required />
          </div>
          <div class="form-group">
            <label for="itemQty">Quantity</label>
            <input type="text" id="itemQty" placeholder="e.g. 150" required />
          </div>
          <button type="submit" class="btn btn-primary">+ Add Item</button>
        </div>
      </form>
      <div id="alertBox" class="alert"></div>
    </div>

    <!-- Two-Column Grid -->
    <div class="grid-2">
      <!-- Inventory Table -->
      <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:0.5rem;">
          <div class="card-title" style="margin-bottom:0;">Current Stock</div>
          <button id="clearBtn" class="btn btn-ghost" style="font-size:0.8rem; padding:0.4rem 0.85rem;">Clear All</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Item</th>
                <th>Qty</th>
                <th>Status</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="tableBody">
              <tr><td colspan="4" class="empty-state">No items yet. Add your first item above.</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- Chart -->
      <div class="card">
        <div class="card-title">Stock Levels</div>
        <div class="chart-container">
          <canvas id="stockChart"></canvas>
        </div>
      </div>
    </div>
  </main>

  <!-- JavaScript -->
  <script>
    const STORAGE_KEY = 'abc_inventory';

    function getItems() {
      return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    }

    function saveItems(items) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
    }

    const form      = document.getElementById('itemForm');
    const nameInput = document.getElementById('itemName');
    const qtyInput  = document.getElementById('itemQty');
    const alertBox  = document.getElementById('alertBox');
    const tableBody = document.getElementById('tableBody');
    const clearBtn  = document.getElementById('clearBtn');

    function showAlert(msg, type) {
      alertBox.textContent = msg;
      alertBox.className = 'alert ' + (type === 'error' ? 'alert-error' : 'alert-success');
      alertBox.style.display = 'block';
      setTimeout(() => { alertBox.style.display = 'none'; }, 3000);
    }

    // Chart setup
    const ctx = document.getElementById('stockChart').getContext('2d');
    const chart = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: [],
        datasets: [{
          label: 'Quantity',
          data: [],
          backgroundColor: [],
          borderColor: [],
          borderWidth: 1,
          borderRadius: 4
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false }
        },
        scales: {
          x: {
            ticks: { color: '#94a3b8', font: { size: 12 } },
            grid: { display: false },
            border: { color: '#334155' }
          },
          y: {
            beginAtZero: true,
            ticks: { color: '#94a3b8', font: { size: 12 } },
            grid: { color: '#1e293b' },
            border: { color: '#334155' }
          }
        }
      }
    });

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function render() {
      const items = getItems();

      // Table
      if (items.length === 0) {
        tableBody.innerHTML = '<tr><td colspan="4" class="empty-state">No items yet. Add your first item above.</td></tr>';
      } else {
        tableBody.innerHTML = items.map((item, i) => {
          const low = item.qty < 10;
          return `<tr>
            <td>${escapeHtml(item.name)}</td>
            <td>${item.qty}</td>
            <td><span class="badge ${low ? 'badge-low' : 'badge-ok'}">${low ? 'Low Stock' : 'In Stock'}</span></td>
            <td>
              <button class="delete-btn" data-index="${i}" title="Remove">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                  <path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
                </svg>
              </button>
            </td>
          </tr>`;
        }).join('');
      }

      // Chart
      chart.data.labels = items.map(i => i.name);
      chart.data.datasets[0].data = items.map(i => i.qty);
      chart.data.datasets[0].backgroundColor = items.map(i => i.qty < 10 ? '#ef4444' : '#3b82f6');
      chart.data.datasets[0].borderColor = items.map(i => i.qty < 10 ? '#dc2626' : '#2563eb');
      chart.update();
    }

    // Add item
    form.addEventListener('submit', function(e) {
      e.preventDefault();
      const name = nameInput.value.trim();
      const rawQty = qtyInput.value.trim();

      if (!/^\d+$/.test(rawQty)) {
        showAlert('Quantity must be a valid whole number (no letters or symbols).', 'error');
        return;
      }

      const qty = parseInt(rawQty, 10);

      if (qty < 0) {
        showAlert('Quantity cannot be negative.', 'error');
        return;
      }

      const items = getItems();
      if (items.some(item => item.name.toLowerCase() === name.toLowerCase())) {
        showAlert(`"${name}" already exists. Use a unique item name.`, 'error');
        return;
      }

      items.push({ name, qty });
      saveItems(items);
      render();
      showAlert(`"${name}" added successfully.`, 'success');
      form.reset();
      nameInput.focus();
    });

    // Delete single item
    tableBody.addEventListener('click', function(e) {
      const btn = e.target.closest('.delete-btn');
      if (!btn) return;
      const index = parseInt(btn.dataset.index, 10);
      const items = getItems();
      items.splice(index, 1);
      saveItems(items);
      render();
    });

    // Clear all
    clearBtn.addEventListener('click', function() {
      if (!confirm('Clear all inventory items? This cannot be undone.')) return;
      localStorage.removeItem(STORAGE_KEY);
      render();
      showAlert('All items cleared.', 'success');
    });

    render();
  </script>
</body>
</html>
